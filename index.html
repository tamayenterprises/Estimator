<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Estimator</title>

<style>
body {font-family: Arial; padding:20px; background:#f7f7f7;}
.container {max-width:520px; margin:auto; background:#fff; padding:20px; border-radius:10px;}
.form-group {margin-bottom:15px;}
.hidden {display:none;}
button {width:100%; padding:12px; margin-top:10px; cursor:pointer;}
.small {font-size:12px; color:#666;}
h2 {margin-bottom:5px;}
</style>
</head>

<body>

<div class="container">

<h2>Want to know how much your project will cost?</h2>
<p class="small">Real Contractors Estimate • No Obligations • No Generic Ranges</p>
<p class="small">Powered by Tamay Enterprises Inc.</p>

<!-- PROJECT TYPE -->
<div class="form-group">
<label>Select your project type</label>
<select id="projectType" onchange="handleProjectType()">
<option value="">Select</option>
<option value="drywall">Drywall / Patching</option>
<option value="lighting">Lighting</option>
</select>
</div>

<!-- ===================== DRYWALL ===================== -->
<div id="drywallSection" class="hidden">

<div class="form-group">
<label>Where is the damage?</label>
<select id="drywallLocation">
<option value="">Select</option>
<option value="wall">Wall</option>
<option value="ceiling">Ceiling</option>
</select>
</div>

<div class="form-group">
<label>How large is the damaged area?</label>
<select id="drywallSize">
<option value="">Select</option>
<option value="small">Small patch</option>
<option value="medium">Medium area</option>
<option value="large">Large area</option>
</select>
</div>

<div class="form-group">
<label>Would you like us to paint after repairs?</label>
<select id="drywallPaint">
<option value="">Select</option>
<option value="yes">Yes</option>
<option value="no">No</option>
</select>
</div>

</div>

<!-- ===================== LIGHTING ===================== -->
<div id="lightingSection" class="hidden">

<div class="form-group">
<label>Type of work</label>
<select id="lightingType">
<option value="">Select</option>
<option value="replace">Replace existing fixture</option>
<option value="new">Add new fixture</option>
</select>
</div>

<div class="form-group">
<label>Location</label>
<select id="fixtureLocation">
<option value="">Select</option>
<option value="ceiling">Ceiling</option>
<option value="wall">Wall</option>
<option value="exterior">Exterior</option>
</select>
</div>

<!-- ACCESS -->
<div class="form-group">
<label>How easy is access for the wiring installation?</label>
<select id="accessDifficulty" onchange="handleLightingLogic()">
<option value="">Select</option>
<option value="very_easy">Very easy</option>
<option value="easy">Easy</option>
<option value="moderate">Moderate</option>
<option value="difficult">Difficult</option>
<option value="not_sure">Not sure</option>
</select>
</div>

<!-- DISTANCE -->
<div class="form-group">
<label>About how far will wiring need to be run?</label>
<select id="wireDistance" onchange="handleLightingLogic()">
<option value="">Select</option>
<option value="short">Short</option>
<option value="medium">Medium</option>
<option value="long">Long</option>
<option value="not_sure">Not sure</option>
</select>
</div>

<!-- SWITCH -->
<div class="form-group">
<label>Will a new switch be needed?</label>
<select id="newSwitch">
<option value="">Select</option>
<option value="yes">Yes</option>
<option value="no">No</option>
</select>
</div>

<!-- ATTIC -->
<div class="form-group hidden" id="atticWrapper">
<label>Is attic access available if needed?</label>
<select id="atticAccess">
<option value="">Select</option>
<option value="yes">Yes</option>
<option value="no">No</option>
<option value="not_sure">Not sure</option>
</select>
</div>

<!-- FIXTURE -->
<div class="form-group">
<label>Do you already have the new light fixture?</label>
<select id="fixtureReady">
<option value="">Select</option>
<option value="yes">Yes</option>
<option value="no">No</option>
</select>
</div>

<!-- REPAIR -->
<div class="form-group">
<label>Would you like us to include repairs if access openings are needed?</label>
<select id="repairNeeded" onchange="handleLightingLogic()">
<option value="">Select</option>
<option value="yes">Yes</option>
<option value="no">No</option>
</select>
</div>

<!-- PAINT -->
<div class="form-group hidden" id="paintWrapper">
<label>Would you like us to paint after the repairs?</label>
<select id="paintNeeded" onchange="handleLightingLogic()">
<option value="">Select</option>
<option value="yes">Yes</option>
<option value="no">No</option>
</select>
</div>

<!-- PAINT SCOPE -->
<div class="form-group hidden" id="paintScopeWrapper">
<label id="paintScopeLabel">What would you like us to paint?</label>
<select id="paintScope">
<option value="">Select</option>
<option value="patch">Patch area only</option>
<option value="full">Full surface</option>
<option value="not_sure">Not sure</option>
</select>
</div>

</div>

<!-- ===================== BUTTON ===================== -->
<button onclick="calculate()">Calculate</button>

<div id="result" class="hidden">
<h3>Your Estimated Price</h3>
<p id="price"></p>
<button onclick="done()">Done</button>
</div>

</div>

<script>

function handleProjectType(){
const type = document.getElementById("projectType").value;

document.getElementById("drywallSection").classList.add("hidden");
document.getElementById("lightingSection").classList.add("hidden");

if(type === "drywall"){
document.getElementById("drywallSection").classList.remove("hidden");
}
if(type === "lighting"){
document.getElementById("lightingSection").classList.remove("hidden");
}
}

function handleLightingLogic(){

const access = document.getElementById("accessDifficulty").value;
const distance = document.getElementById("wireDistance").value;
const repair = document.getElementById("repairNeeded").value;
const paint = document.getElementById("paintNeeded")?.value;
const location = document.getElementById("fixtureLocation")?.value;

// ATTIC
if(distance === "long" || access === "moderate" || access === "difficult"){
document.getElementById("atticWrapper").classList.remove("hidden");
}else{
document.getElementById("atticWrapper").classList.add("hidden");
}

// REPAIR
if(repair === "yes"){
document.getElementById("paintWrapper").classList.remove("hidden");
}else{
document.getElementById("paintWrapper").classList.add("hidden");
document.getElementById("paintScopeWrapper").classList.add("hidden");
}

// PAINT
if(paint === "yes"){
document.getElementById("paintScopeWrapper").classList.remove("hidden");

let label = "What would you like us to paint?";

if(location === "ceiling") label = "What part of the ceiling would you like us to paint?";
if(location === "wall") label = "What part of the wall would you like us to paint?";
if(location === "exterior") label = "What exterior area would you like us to paint?";

document.getElementById("paintScopeLabel").innerText = label;

}else{
document.getElementById("paintScopeWrapper").classList.add("hidden");
}

}

// CALCULATION
function calculate(){

let base = 0;
const type = document.getElementById("projectType").value;

// DRYWALL
if(type === "drywall"){
base = 150;
if(document.getElementById("drywallSize").value === "medium") base += 100;
if(document.getElementById("drywallSize").value === "large") base += 200;
if(document.getElementById("drywallPaint").value === "yes") base += 150;
}

// LIGHTING
if(type === "lighting"){
base = 150;

if(document.getElementById("accessDifficulty").value === "moderate") base += 100;
if(document.getElementById("accessDifficulty").value === "difficult") base += 200;

if(document.getElementById("wireDistance").value === "medium") base += 100;
if(document.getElementById("wireDistance").value === "long") base += 200;

if(document.getElementById("repairNeeded").value === "yes") base += 150;
if(document.getElementById("paintNeeded").value === "yes") base += 150;
}

document.getElementById("result").classList.remove("hidden");
document.getElementById("price").innerText = "$" + base;
}

function done(){
location.reload();
}

</script>

</body>
</html>
