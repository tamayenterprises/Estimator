<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Project Cost Estimator</title>

  <link rel="stylesheet" href="./styles.css" />
</head>

<body>

<div class="page">
  <div class="container">
    <div class="card">

      <!-- HEADER -->
      <div class="hero">
        <h1>Want to know how much your project will cost?</h1>
        <p>Real contractor-based pricing. No guesswork.</p>
      </div>

      <!-- FORM -->
      <form id="estimatorForm">

        <!-- STEP 1 -->
        <div class="step active" data-step="1">
          <h2>Select Your Project</h2>

          <select id="projectType">
            <option value="drywall">Drywall Repair</option>
            <option value="lighting">Lighting</option>
            <option value="paint">Painting</option>
          </select>

          <button type="button" id="toStep2">Next</button>
        </div>

        <!-- STEP 2 -->
        <div class="step" data-step="2">
          <h2>Project Basics</h2>

          <!-- DRYWALL -->
          <div id="drywallSection">
            <label>Damage Size</label>
            <select id="damageSize">
              <option value="small">Small</option>
              <option value="medium">Medium</option>
              <option value="large">Large</option>
            </select>
          </div>

          <!-- LIGHTING -->
          <div id="lightingSection" class="hidden">
            <label>Fixtures</label>
            <select id="fixtureCount">
              <option value="1">1</option>
              <option value="2">2</option>
              <option value="3">3</option>
            </select>
          </div>

          <!-- PAINT -->
          <div id="paintSection" class="hidden">
            <label>Room Size</label>
            <select id="roomSize">
              <option value="small">Small</option>
              <option value="medium">Medium</option>
              <option value="large">Large</option>
            </select>
          </div>

          <button type="button" id="backTo1">Back</button>
          <button type="button" id="toStep3">Next</button>
        </div>

        <!-- STEP 3 -->
        <div class="step" data-step="3">
          <h2>Customer Info</h2>

          <input type="text" id="name" placeholder="Full Name" />
          <input type="tel" id="phone" placeholder="Phone" />
          <input type="email" id="email" placeholder="Email" />

          <button type="button" id="backTo2">Back</button>
          <button type="submit">Calculate</button>
        </div>

      </form>

      <!-- RESULTS -->
      <div id="results" class="hidden">
        <h2>Your Estimate</h2>

        <p id="materials"></p>
        <p id="labor"></p>
        <p id="total"></p>

        <button id="restart">Start New</button>
      </div>

    </div>
  </div>
</div>

<script defer src="./app.js"></script>

</body>
</html>
